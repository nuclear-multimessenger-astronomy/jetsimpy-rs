site_name: blastwave
site_url: https://nuclear-multimessenger-astronomy.github.io/blastwave/
repo_url: https://github.com/nuclear-multimessenger-astronomy/blastwave
repo_name: blastwave
site_description: Fast Rust GRB afterglow simulator with Python bindings
site_author: Michael Coughlin

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - Physics:
    - Hydrodynamics: physics/hydrodynamics.md
    - Radiation Models: physics/radiation.md
    - Forward-Mapping Flux: physics/forward-mapping.md
  - Examples:
    - AT2018cow Radio: examples/at2018cow.md
    - AT2022cmc Radio: examples/at2022cmc.md
    - GRB 200826A: examples/grb200826a.md
    - GW170817: examples/gw170817.md
    - Reverse Shock: examples/reverse_shock.md
    - Numeric Model: examples/numeric_comparison.md
    - Physics Showcase: examples/grb_afterglow.md
  - Validation:
    - Overview: validation/index.md
    - Jets: validation/jets.md
    - Dynamics: validation/dynamics.md
    - Radiation: validation/radiation.md
    - Thermal Electrons: validation/thermal.md
  - Benchmarks: benchmarks.md
  - API Reference:
    - Overview: api/index.md
    - Numeric Model: api/numeric.md
    - EBL Absorption: api/ebl.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: python
          class: python
          validator: !!python/name:markdown_exec.validator
          format: !!python/name:markdown_exec.formatter
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

plugins:
  - search
  - markdown-exec

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
