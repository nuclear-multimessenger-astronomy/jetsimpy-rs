name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run cargo test
        run: cargo test

  python-tests:
    name: Python Comparison Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install maturin numpy pytest

      - name: Build and install PyO3 extension
        run: pip install ./rust

      - name: Install blastwave Python package
        run: pip install .

      - name: Install VegasAfterglow
        run: |
          pip install scikit-build-core pybind11 setuptools-scm cmake ninja
          git clone https://github.com/YihanWangAstro/VegasAfterglow.git /tmp/VegasAfterglow
          pip install /tmp/VegasAfterglow

      - name: Run tests
        run: pytest tests/ -v
